# ===== SERVER =====
server.port=8080

# ===== DATABASE (H2 in-memory — data disappears when app stops) =====
spring.datasource.url=jdbc:h2:mem:taskdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=samvitn
spring.datasource.password=password123

# ===== JPA / HIBERNATE =====
# create-drop: creates tables at startup, drops at shutdown (good for dev)
spring.jpa.hibernate.ddl-auto=create-drop
# show SQL in console so you can see what Hibernate generates
spring.jpa.show-sql=true
# format the SQL nicely instead of one long line
spring.jpa.properties.hibernate.format_sql=true

# ===== H2 CONSOLE (browser-based DB viewer at http://localhost:8080/h2-console) =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JWT CONFIGURATION =====
app.jwt.secret=my-super-secret-key-that-should-be-at-least-256-bits-long-for-HS256-algorithm
app.jwt.expiration=86400000

# ===== SPRING AI (Ollama - local, free) =====
spring.ai.ollama.chat.options.model=llama3.2
spring.ai.ollama.chat.options.temperature=0.7


